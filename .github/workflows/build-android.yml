name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK platforms
      run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

    - name: Install client dependencies
      run: npm ci
      working-directory: client

    - name: Build client
      run: npm run build
      working-directory: client

    - name: Remove old android folder
      run: Remove-Item -Recurse -Force client/android -ErrorAction SilentlyContinue
      shell: pwsh

    - name: Add Capacitor Android
      run: npx cap add android
      working-directory: client

    - name: Sync Capacitor Android
      run: npx cap sync android
      working-directory: client

    - name: Build APK Debug
      run: ./gradlew assembleDebug
      working-directory: client/android

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-journal-apk
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
